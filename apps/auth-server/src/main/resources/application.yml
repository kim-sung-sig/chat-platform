# Auth Server Configuration
# JWT Configuration
auth:
  jwt:
    # 256-bit secret key - 환경변수 JWT_SECRET_KEY 로 외부화 (Config Server 또는 직접 설정)
    secret: ${JWT_SECRET_KEY:your-256-bit-secret-key-change-this-in-production-environment-please-use-strong-key}
    access-ttl-minutes: 15
    refresh-ttl-days: 7
    mfa-ttl-minutes: 5
  totp:
    issuer: ChatApplication
# Spring Boot Logging
logging:
  level:
    com.example.chat.auth: DEBUG
    org.springframework.security: DEBUG
# Micrometer Tracing
management:
  tracing:
    sampling:
      probability: 1.0