# ===================================================================
# WebSocket Server ?? ?? (Config Server ?? ?)
# ===================================================================
server.port=20002
spring.application.name=chat-websocket-server

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# WebSocket
websocket.allowed-origins[0]=${FRONTEND_URL:http://localhost:3000}
websocket.allowed-origins[1]=http://localhost:8080
websocket.endpoint=/ws
websocket.topic-prefix=/topic
websocket.app-prefix=/app
