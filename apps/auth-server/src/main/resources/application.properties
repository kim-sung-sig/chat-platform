spring.application.name=auth-server
server.port=18080

# ?? ???? (?? ? -Dspring.profiles.active=prod ?? override ??)
spring.profiles.active=dev

# Virtual Threads (Java 21)
spring.threads.virtual.enabled=true
# Spring Cloud Config (optional - Config Server ?? ??? ?? ??)
spring.cloud.config.enabled=false
spring.config.import=optional:configserver:http://localhost:8888,optional:classpath:application-auth.properties
# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.appname=${spring.application.name}
# Logback
logging.config=classpath:logback-spring.xml
# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
# JPA ??
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# DataSource / JPA / Redis / Logging -> ????? ?? (application-dev.properties / application-prod.properties)
