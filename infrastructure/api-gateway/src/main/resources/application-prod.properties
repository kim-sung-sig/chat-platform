# ===================================================================
# Prod Profile - api-gateway
# ===================================================================
eureka.client.service-url.defaultZone=${EUREKA_URL:http://eureka-server:8761/eureka/}

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins[0]=${FRONTEND_URL:https://chat.example.com}

management.tracing.sampling.probability=0.1

logging.level.org.springframework.cloud.gateway=WARN
logging.level.reactor.netty=WARN
logging.level.com.example.chat.gateway=INFO
