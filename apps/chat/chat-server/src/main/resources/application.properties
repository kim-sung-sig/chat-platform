spring.application.name=chat-server
server.port=20001
# Spring Cloud Config (optional - Config Server 꺼져 있어도 기동 가능)
spring.cloud.config.enabled=false
spring.config.import=optional:configserver:http://localhost:8888,optional:classpath:application-security.properties
# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
# JWT Security (환경변수 JWT_SECRET_KEY, 없으면 Config Server에서 주입)
security.jwt.secret-key=${JWT_SECRET_KEY:your-256-bit-secret-key-change-this-in-production-environment-please-use-strong-key}
# DataSource (Source: Write / Replica: Read)
spring.datasource.source.driver-class-name=org.postgresql.Driver
spring.datasource.source.url=${DB_SOURCE_URL:jdbc:postgresql://localhost:15432/messagesystem}
spring.datasource.source.username=${DB_USERNAME:dev_user}
spring.datasource.source.password=${DB_PASSWORD:dev_password}
spring.datasource.replica.driver-class-name=org.postgresql.Driver
spring.datasource.replica.url=${DB_REPLICA_URL:jdbc:postgresql://localhost:15433/messagesystem}
spring.datasource.replica.username=${DB_USERNAME:dev_user}
spring.datasource.replica.password=${DB_PASSWORD:dev_password}
# JPA / Hibernate
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
# Flyway
spring.flyway.enabled=false
# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:16379}
# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
# Virtual Threads (Java 21)
spring.threads.virtual.enabled=true
# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Seoul
# Logging
logging.level.root=INFO
logging.level.com.example.chat=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
