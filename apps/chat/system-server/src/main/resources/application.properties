# Application Name
spring.application.name=chat-system-server
server.port=20003

# Spring Cloud Config
spring.cloud.config.enabled=false

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# JWT Security Configuration - HS256 (auth-server ?? secret-key ??)
security.jwt.secret-key=${JWT_SECRET_KEY:your-256-bit-secret-key-change-this-in-production-environment-please-use-strong-key}

# DataSource Configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:15432/messagesystem
spring.datasource.username=dev_user
spring.datasource.password=dev_password

# JPA Configuration
spring.jpa.open-in-view=false

# HTTP Client Configuration (RestTemplate)
spring.http.client.connect-timeout=5s
spring.http.client.read-timeout=30s

# Quartz Scheduler Configuration
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always
spring.quartz.properties.org.quartz.scheduler.instanceName=ChatSystemScheduler
spring.quartz.properties.org.quartz.scheduler.instanceId=AUTO
spring.quartz.properties.org.quartz.threadPool.threadCount=10

# Batch Configuration
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# Logging Configuration
logging.level.root=INFO
logging.level.com.example.chat.system=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Seoul

# Virtual Thread Configuration (Java 21)
spring.threads.virtual.enabled=true

# Redis (Session ???)
spring.data.redis.host=localhost
spring.data.redis.port=16379
spring.data.redis.password=dev_password
