# ===================================================================
# Dev Profile - websocket-server
# ===================================================================
spring.data.redis.host=localhost
spring.data.redis.port=16379
spring.data.redis.password=dev_password

websocket.allowed-origins[0]=http://localhost:3000
websocket.allowed-origins[1]=http://localhost:8080
websocket.endpoint=/ws
websocket.topic-prefix=/topic
websocket.app-prefix=/app

logging.level.com.example.chat=DEBUG
