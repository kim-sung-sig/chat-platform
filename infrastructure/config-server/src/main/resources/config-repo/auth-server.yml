# Auth Server 전용 설정
server:
  port: 18080

spring:
  application:
    name: auth-server
  datasource:
    url: ${DB_AUTH_URL:jdbc:postgresql://localhost:15432/authsystem}
    username: ${DB_USERNAME:dev_user}
    password: ${DB_PASSWORD:dev_password}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:16379}
      password: ${REDIS_PASSWORD:dev_password}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    appname: ${spring.application.name}

# JWT (auth-server 전용 - 발급 설정)
auth:
  jwt:
    secret: ${JWT_SECRET_KEY:your-256-bit-secret-key-change-this-in-production-environment-please-use-strong-key}
    access-ttl-minutes: 15
    refresh-ttl-days: 7
    mfa-ttl-minutes: 5
  totp:
    issuer: ChatApplication
