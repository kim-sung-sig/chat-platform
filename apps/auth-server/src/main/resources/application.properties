spring.application.name=auth-server
server.port=18080
# Virtual Threads (Java 21)
spring.threads.virtual.enabled=true
# Spring Cloud Config (optional - Config Server 꺼져 있어도 기동 가능)
spring.cloud.config.enabled=false
spring.config.import=optional:configserver:http://localhost:8888
# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.appname=${spring.application.name}
# Logback
logging.config=classpath:logback-spring.xml
# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
# DataSource
spring.datasource.url=${DB_AUTH_URL:jdbc:postgresql://localhost:15432/authsystem}
spring.datasource.username=${DB_USERNAME:dev_user}
spring.datasource.password=${DB_PASSWORD:dev_password}
# JPA
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:16379}
spring.data.redis.password=${REDIS_PASSWORD:dev_password}
# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.example.chat.auth=DEBUG