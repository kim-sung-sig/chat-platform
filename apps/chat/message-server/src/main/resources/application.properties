spring.application.name=chat-server

server.port=20001

# Spring Cloud Config
spring.cloud.config.enabled=false

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# Import DataSource Configuration from chat-storage module
spring.config.import=optional:classpath:application-db.properties, optional:classpath:application-security.properties

# File upload
spring.servlet.multipart.enabled = true
spring.servlet.multipart.max-file-size = 10MB
spring.servlet.multipart.max-request-size = 50MB

# virtual threads
spring.threads.virtual.enabled=true

# JWT Security Configuration - HS256 (auth-server ?? secret-key ??)
security.jwt.secret-key=${JWT_SECRET_KEY:your-256-bit-secret-key-change-this-in-production-environment-please-use-strong-key}

# Logging for debugging JWT issues
logging.level.org.springframework.security=DEBUG
logging.level.com.example.chat.auth=DEBUG

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:15432/messagesystem
spring.datasource.username=dev_user
spring.datasource.password=dev_password

# DataSource Configuration (Source DB - Write)
#spring.datasource.source.driver-class-name=org.postgresql.Driver
#spring.datasource.source.url=jdbc:postgresql://localhost:15432/messagesystem
#spring.datasource.source.username=dev_user
#spring.datasource.source.password=dev_password
## DataSource Configuration (Replica DB - Read)
#spring.datasource.replica.driver-class-name=org.postgresql.Driver
#spring.datasource.replica.url=jdbc:postgresql://localhost:15433/messagesystem
#spring.datasource.replica.username=dev_user
#spring.datasource.replica.password=dev_password
# Flyway Configuration
spring.flyway.enabled=false
spring.flyway.url=jdbc:postgresql://localhost:15432/messagesystem
spring.flyway.user=dev_user
spring.flyway.password=dev_password
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
# JPA Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=16379
spring.data.redis.password=dev_password
