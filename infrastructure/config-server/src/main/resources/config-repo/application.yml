# 공통 설정 (모든 서비스에 공유)
# JWT - 모든 서비스 공통 시크릿 (환경변수 JWT_SECRET_KEY 로 외부화)
security:
  jwt:
    secret-key: ${JWT_SECRET_KEY:your-256-bit-secret-key-change-this-in-production-environment-please-use-strong-key}
# Actuator 공통 설정
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
# Logging 공통 설정
logging:
  level:
    root: INFO
    com.example.chat: DEBUG