spring.application.name=chat-websocket-server

server.port=20002

# Spring Cloud Config
spring.cloud.config.enabled=false

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# JWT Security Configuration - HS256 (auth-server ?? secret-key ??)
security.jwt.secret-key=${JWT_SECRET_KEY:your-256-bit-secret-key-change-this-in-production-environment-please-use-strong-key}

# File upload
spring.servlet.multipart.enabled = true
spring.servlet.multipart.max-file-size = 10MB
spring.servlet.multipart.max-request-size = 50MB

# JPA Auto Configuration ???? (WebSocket ??? JPA ???)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

# Redis (Session ???)
spring.data.redis.host=localhost
spring.data.redis.port=16379
spring.data.redis.password=dev_password
