# ===================================================================
# Auth Server ?? ?? (Config Server ?? ?)
# ===================================================================
server.port=18080
spring.application.name=auth-server

# DataSource
spring.datasource.url=${DB_AUTH_URL:jdbc:postgresql://localhost:15432/authsystem}
spring.datasource.username=${DB_USERNAME:dev_user}
spring.datasource.password=${DB_PASSWORD:dev_password}

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:16379}
spring.data.redis.password=${REDIS_PASSWORD:dev_password}

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.appname=${spring.application.name}

# JWT (auth-server ?? - ?? ??)
auth.jwt.secret=${JWT_SECRET_KEY:your-256-bit-secret-key-change-this-in-production-environment-please-use-strong-key}
auth.jwt.access-ttl-minutes=15
auth.jwt.refresh-ttl-days=7
auth.jwt.mfa-ttl-minutes=5
auth.totp.issuer=ChatApplication
